version: "3"
services:
  gateway:
    build: ./gateway
    image: gateway:latest
    environment:
      - NATS_URL=nats://nats:4222
      - ORDER_URL=http://order-service:5000
      - PAYMENT_URL=http://payment-service:5000
      - STOCK_URL=http://stock-service:5000
    command: uvicorn app:app --host 0.0.0.0 --port 8000 --workers 2 --log-level info --no-access-log
    volumes:
      - ./common:/app/common:ro
    ports:
      - "8000:8000"
    depends_on:
      - order-service
      - stock-service
      - payment-service
      - nats

  nats:
    image: nats:2.12-alpine
    command: ["--js"]
    ports:
      - "4222:4222"


  order-service:
    build: ./order
    image: order:latest
    environment:
      - GATEWAY_URL=http://gateway:8000
      - NATS_URL=nats://nats:4222
      - REDIS_SHARDS=order-db-0:6379,order-db-1:6379,order-db-2:6379
    command: python app.py
    env_file:
      - env/order_redis.env
    volumes:
      - ./common:/app/common:ro
    depends_on:
      - order-db-0
      - order-db-1
      - order-db-2
      - nats

  order-db-0:
    image: redis:7.2-bookworm
    command: redis-server --requirepass redis --maxmemory 512mb

  order-db-1:
    image: redis:7.2-bookworm
    command: redis-server --requirepass redis --maxmemory 512mb

  order-db-2:
    image: redis:7.2-bookworm
    command: redis-server --requirepass redis --maxmemory 512mb


  stock-service:
    build: ./stock
    image: stock:latest
    environment:
      - NATS_URL=nats://nats:4222
      - REDIS_SHARDS=stock-db-0:6379,stock-db-1:6379,stock-db-2:6379
    command: python app.py
    env_file:
      - env/stock_redis.env
    volumes:
      - ./common:/app/common:ro
    depends_on:
      - stock-db-0
      - stock-db-1
      - stock-db-2
      - nats

  stock-db-0:
    image: redis:7.2-bookworm
    command: redis-server --requirepass redis --maxmemory 512mb

  stock-db-1:
    image: redis:7.2-bookworm
    command: redis-server --requirepass redis --maxmemory 512mb

  stock-db-2:
    image: redis:7.2-bookworm
    command: redis-server --requirepass redis --maxmemory 512mb


  payment-service:
    build: ./payment
    image: user:latest
    environment:
      - NATS_URL=nats://nats:4222
      - REDIS_SHARDS=payment-db-0:6379,payment-db-1:6379,payment-db-2:6379
    command: python app.py
    env_file:
      - env/payment_redis.env
    volumes:
      - ./common:/app/common:ro
    depends_on:
      - payment-db-0
      - payment-db-1
      - payment-db-2
      - nats

  payment-db-0:
    image: redis:7.2-bookworm
    command: redis-server --requirepass redis --maxmemory 512mb

  payment-db-1:
    image: redis:7.2-bookworm
    command: redis-server --requirepass redis --maxmemory 512mb

  payment-db-2:
    image: redis:7.2-bookworm
    command: redis-server --requirepass redis --maxmemory 512mb
