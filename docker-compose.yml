services:
  kafka:
    image: apache/kafka:4.2.0
    environment:
      - KAFKA_NODE_ID=1
      - KAFKA_PROCESS_ROLES=broker,controller
      - KAFKA_LISTENERS=INTERNAL://:19092,EXTERNAL://:9092,CONTROLLER://:9093
      - KAFKA_ADVERTISED_LISTENERS=INTERNAL://kafka:19092,EXTERNAL://localhost:9092
      - KAFKA_LISTENER_SECURITY_PROTOCOL_MAP=INTERNAL:PLAINTEXT,EXTERNAL:PLAINTEXT,CONTROLLER:PLAINTEXT
      - KAFKA_INTER_BROKER_LISTENER_NAME=INTERNAL
      - KAFKA_CONTROLLER_LISTENER_NAMES=CONTROLLER
      - KAFKA_CONTROLLER_QUORUM_VOTERS=1@kafka:9093
      - KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR=1
      - KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR=1
      - KAFKA_TRANSACTION_STATE_LOG_MIN_ISR=1
      - KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS=0
      - KAFKA_LOG4J_ROOT_LOGLEVEL=WARN
    volumes:
      - kafka-data:/var/lib/kafka/data
    ports:
      - "9092:9092"
    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-broker-api-versions.sh --bootstrap-server localhost:19092 > /dev/null 2>&1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  kafka-init:
    image: apache/kafka:4.2.0
    environment:
      - PAYMENT_CREDIT_TOPIC=payment-credit-check
      - STOCK_CHECK_TOPIC=stock-check
      - STOCK_CHECK_RESULT_TOPIC=stock-check-result
      - ORDER_CHECKOUT_RESULT_TOPIC=order-checkout-result
    depends_on:
      kafka:
        condition: service_healthy
    command: >
      bash -lc '
      until /opt/kafka/bin/kafka-broker-api-versions.sh --bootstrap-server kafka:19092 > /dev/null 2>&1; do sleep 2; done;
      /opt/kafka/bin/kafka-topics.sh --bootstrap-server kafka:19092 --create --if-not-exists --topic $$PAYMENT_CREDIT_TOPIC --partitions 1 --replication-factor 1;
      /opt/kafka/bin/kafka-topics.sh --bootstrap-server kafka:19092 --create --if-not-exists --topic $$STOCK_CHECK_TOPIC --partitions 1 --replication-factor 1;
      /opt/kafka/bin/kafka-topics.sh --bootstrap-server kafka:19092 --create --if-not-exists --topic $$STOCK_CHECK_RESULT_TOPIC --partitions 1 --replication-factor 1;
      /opt/kafka/bin/kafka-topics.sh --bootstrap-server kafka:19092 --create --if-not-exists --topic $$ORDER_CHECKOUT_RESULT_TOPIC --partitions 1 --replication-factor 1;
      /opt/kafka/bin/kafka-topics.sh --bootstrap-server kafka:19092 --describe --topic $$PAYMENT_CREDIT_TOPIC > /dev/null 2>&1;
      /opt/kafka/bin/kafka-topics.sh --bootstrap-server kafka:19092 --describe --topic $$STOCK_CHECK_TOPIC > /dev/null 2>&1;
      /opt/kafka/bin/kafka-topics.sh --bootstrap-server kafka:19092 --describe --topic $$STOCK_CHECK_RESULT_TOPIC > /dev/null 2>&1;
      /opt/kafka/bin/kafka-topics.sh --bootstrap-server kafka:19092 --describe --topic $$ORDER_CHECKOUT_RESULT_TOPIC > /dev/null 2>&1;
      '

  gateway:
    image: nginx:1.25-bookworm
    volumes:
      - ./gateway_nginx.conf:/etc/nginx/nginx.conf:ro
    ports:
      - "8000:80"
    depends_on:
      - order-service
      - stock-service
      - payment-service

  order-service:
    build:
      context: .
      dockerfile: ./order/Dockerfile
    image: order:latest
    environment:
      - GATEWAY_URL=http://gateway:80
      - KAFKA_BOOTSTRAP_SERVERS=kafka:19092
      - PAYMENT_CREDIT_TOPIC=payment-credit-check
      - ORDER_CHECKOUT_RESULT_TOPIC=order-checkout-result
    command: uvicorn app:app --host 0.0.0.0 --port 5000 --workers 2 --log-level warning
    env_file:
      - env/order_redis.env
    depends_on:
      order-db:
        condition: service_healthy
      kafka:
        condition: service_healthy
      kafka-init:
        condition: service_completed_successfully

  order-db:
    image: redis:7.2-bookworm
    command: redis-server --requirepass redis --maxmemory 512mb
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "redis", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 5s

  stock-service:
    build:
      context: .
      dockerfile: ./stock/Dockerfile
    image: stock:latest
    environment:
      - KAFKA_BOOTSTRAP_SERVERS=kafka:19092
      - STOCK_CHECK_TOPIC=stock-check
      - STOCK_CHECK_RESULT_TOPIC=stock-check-result
      - ORDER_CHECKOUT_RESULT_TOPIC=order-checkout-result
    command: uvicorn app:app --host 0.0.0.0 --port 5000 --workers 2 --log-level warning
    env_file:
      - env/stock_redis.env
    depends_on:
      stock-db:
        condition: service_healthy
      kafka:
        condition: service_healthy
      kafka-init:
        condition: service_completed_successfully

  stock-db:
    image: redis:7.2-bookworm
    command: redis-server --requirepass redis --maxmemory 512mb
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "redis", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 5s

  payment-service:
    build:
      context: .
      dockerfile: ./payment/Dockerfile
    image: user:latest
    environment:
      - KAFKA_BOOTSTRAP_SERVERS=kafka:19092
      - PAYMENT_CREDIT_TOPIC=payment-credit-check
      - STOCK_CHECK_TOPIC=stock-check
      - STOCK_CHECK_RESULT_TOPIC=stock-check-result
      - ORDER_CHECKOUT_RESULT_TOPIC=order-checkout-result
    command: uvicorn app:app --host 0.0.0.0 --port 5000 --workers 2 --log-level warning
    env_file:
      - env/payment_redis.env
    depends_on:
      payment-db:
        condition: service_healthy
      kafka:
        condition: service_healthy
      kafka-init:
        condition: service_completed_successfully

  payment-db:
    image: redis:7.2-bookworm
    command: redis-server --requirepass redis --maxmemory 512mb
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "redis", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 5s

volumes:
  kafka-data:
