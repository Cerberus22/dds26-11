events {
    worker_connections 2048;
}

http {
    upstream gateways {
        # least_conn;
        server gateway:8000;
        keepalive 64;
    }

    server {
        listen 80;
        access_log off;
        location / {
            proxy_pass http://gateways;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }
    }
}

